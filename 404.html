<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found · Anthony Johnson</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800&family=IBM+Plex+Mono:wght@500&family=Public+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root { --paper: #F3F5F7; --ink: #0E1B2C; --ink-soft: #45556B; --signal: #FFC72C; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Public Sans', system-ui, sans-serif;
    background: var(--paper); color: var(--ink);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 28px;
  }
  .code {
    font-family: 'IBM Plex Mono', monospace; font-weight: 500; font-size: 0.8rem;
    letter-spacing: 0.16em; color: #fff; background: var(--ink);
    padding: 4px 12px; border-radius: 4px; display: inline-block; margin-bottom: 20px;
  }
  h1 { font-family: 'Archivo', sans-serif; font-weight: 800; font-size: clamp(2rem, 5vw, 3rem); letter-spacing: -0.02em; margin-bottom: 12px; }
  p { color: var(--ink-soft); margin-bottom: 28px; }
  a.btn {
    font-family: 'Archivo', sans-serif; font-weight: 600; text-decoration: none;
    background: var(--ink); color: #fff; padding: 13px 24px; border-radius: 6px; display: inline-block;
  }
  a.btn:focus-visible { outline: 3px solid var(--signal); outline-offset: 3px; }
</style>
</head>
<body>
  <main>
    <span class="code">404 · OUT OF SERVICE</span>
    <h1>This stop doesn't exist</h1>
    <p>The page you're looking for isn't on this line. Let's get you back on route.</p>
    <a class="btn" href="/">Return to the main platform</a>
  </main>
</body>
